<div class="users-toolbar">
    <nz-input-wrapper class="users-toolbar__search">
        <nz-icon nzInputPrefix nzType="search" />
        <input nz-input type="text" aria-label="Search users by name or phone" placeholder="Search by name or phone"
            [ngModel]="searchQuery()" (ngModelChange)="onSearchChange($event)" />
    </nz-input-wrapper>

    <nz-select class="users-toolbar__filter" nzId="users-status-filter" nzAriaLabel="Filter users by status"
        nzPlaceHolder="Status" [ngModel]="activeFilter()" (ngModelChange)="onActiveFilterChange($event)">
        <nz-option nzValue="all" nzLabel="All"></nz-option>
        <nz-option nzValue="active" nzLabel="Active"></nz-option>
        <nz-option nzValue="inactive" nzLabel="Inactive"></nz-option>
    </nz-select>

    <nz-select class="users-toolbar__filter" nzId="users-age-filter" nzAriaLabel="Filter users by age"
        nzPlaceHolder="Age" [ngModel]="ageFilter()" (ngModelChange)="onAgeFilterChange($event)">
        <nz-option nzValue="all" nzLabel="All ages"></nz-option>
        <nz-option nzValue="under18" nzLabel="Under 18"></nz-option>
        <nz-option nzValue="over18" nzLabel="Over 18"></nz-option>
    </nz-select>
</div>
